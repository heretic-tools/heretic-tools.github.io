<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chaos - HereticTools</title>
  <link rel="stylesheet" href="/static/desktop.css">
  <link rel="stylesheet" href="/static/codex.css">
  <meta name="heretic-base-path" content="">
  <meta name="heretic-search-index" content="/search-index.json">
</head>
<body>
  <main class="desktop codex-page faction-list-page many-buttons-page">
    <section class="shell" aria-label="Chaos">
      <div class="title-bar " role="button" tabindex="0" aria-label="Back to Codex" title="Back to Codex" data-up-href="/">
        <div class="title">Chaos</div>
        <div class="title-controls" aria-hidden="true">
          <span class="title-control">x</span>
        </div>
      </div>

      <div class="panel">
        <div class="panel-content">
          <div class="launch-grid" aria-label="Faction sections">
          <button class="launcher has-faction-image" type="button" data-app="Chaos Knights" data-route="chaos-knights" data-href="/faction/chaos-knights" aria-pressed="false">
            <span class="faction-art-frame" aria-hidden="true"><img class="faction-art" src="/assets/faction-images/chaos-knights__2e79f9cd__roster-header.png" alt=""></span>

            <span class="label">Chaos Knights</span>
          </button>

          <button class="launcher has-faction-image" type="button" data-app="Death Guard" data-route="death-guard" data-href="/faction/death-guard" aria-pressed="false">
            <span class="faction-art-frame" aria-hidden="true"><img class="faction-art" src="/assets/faction-images/death-guard__19176137__roster-header.png" alt=""></span>

            <span class="label">Death Guard</span>
          </button>

          <button class="launcher has-faction-image" type="button" data-app="Emperor’s Children" data-route="emperors-children" data-href="/faction/emperors-children" aria-pressed="false">
            <span class="faction-art-frame" aria-hidden="true"><img class="faction-art" src="/assets/faction-images/emperors-children__b63a417d__roster-header.png" alt=""></span>

            <span class="label">Emperor’s Children</span>
          </button>

          <button class="launcher has-faction-image" type="button" data-app="Heretic Astartes" data-route="heretic-astartes" data-href="/faction/heretic-astartes" aria-pressed="false">
            <span class="faction-art-frame" aria-hidden="true"><img class="faction-art" src="/assets/faction-images/heretic-astartes__d4162ab7__roster-header.png" alt=""></span>

            <span class="label">Heretic Astartes</span>
          </button>

          <button class="launcher has-faction-image" type="button" data-app="Legiones Daemonica" data-route="legiones-daemonica" data-href="/faction/legiones-daemonica" aria-pressed="false">
            <span class="faction-art-frame" aria-hidden="true"><img class="faction-art" src="/assets/faction-images/legiones-daemonica__40a70c91__roster-header.png" alt=""></span>

            <span class="label">Legiones Daemonica</span>
          </button>

          <button class="launcher has-faction-image" type="button" data-app="Thousand Sons" data-route="thousand-sons" data-href="/faction/thousand-sons" aria-pressed="false">
            <span class="faction-art-frame" aria-hidden="true"><img class="faction-art" src="/assets/faction-images/thousand-sons__25d2c58f__roster-header.png" alt=""></span>

            <span class="label">Thousand Sons</span>
          </button>

          <button class="launcher has-faction-image" type="button" data-app="Titanicus Traitoris" data-route="titanicus-traitoris" data-href="/faction/titanicus-traitoris" aria-pressed="false">
            <span class="faction-art-frame" aria-hidden="true"><img class="faction-art" src="/assets/faction-images/titanicus-traitoris__46cec02c__roster-header.png" alt=""></span>

            <span class="label">Titanicus Traitoris</span>
          </button>

          <button class="launcher has-faction-image" type="button" data-app="World Eaters" data-route="world-eaters" data-href="/faction/world-eaters" aria-pressed="false">
            <span class="faction-art-frame" aria-hidden="true"><img class="faction-art" src="/assets/faction-images/world-eaters__8bd4c67d__roster-header.png" alt=""></span>

            <span class="label">World Eaters</span>
          </button>

          </div>
        </div>
      </div>
    </section>

    <footer class="taskbar" aria-label="Desktop taskbar">
      <a class="start-button" href="/">
        <span class="start-mark" aria-hidden="true">
          <img class="start-art" src="/assets/icons/start.png" alt="">
        </span>
        Start
      </a>
      <form class="taskbar-search" role="search" autocomplete="off">
        <label class="visually-hidden" for="taskbar-search-input">Search</label>
        <input id="taskbar-search-input" class="taskbar-search-input" type="search" name="q" placeholder="Search" aria-label="Search" aria-expanded="false" aria-controls="taskbar-search-results" autocomplete="off" spellcheck="false">
        <div id="taskbar-search-results" class="taskbar-search-results" role="list" hidden></div>
      </form>
    </footer>
  </main>

  <script src="/static/win-scrollbars.js" defer></script>
  <script src="/static/taskbar-search.js" defer></script>
  <script src="/static/codex.js" defer></script>
</body>
</html>
